services:
  postgres:
    image: postgres:16-alpine
    container_name: travellta-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: travellta
      POSTGRES_PASSWORD: travellta
      POSTGRES_DB: travellta
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travellta -d travellta"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
